<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - نظام المستويات</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --grid-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
        }

        .stat-box {
            background: var(--grid-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            min-width: 80px;
        }

        .difficulty-selector {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .diff-btn.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .game-board {
            position: relative;
            width: 350px;
            height: 350px;
            background: var(--grid-bg);
            border-radius: 15px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tile {
            width: 100%;
            height: 100%;
            background: #0f3460;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            transition: all 0.15s ease;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* تدرج الألوان الملحمي */
        .v-2 { background: #4ecca3; color: #1a1a2e; }
        .v-4 { background: #45b7d1; }
        .v-8 { background: #3498db; }
        .v-16 { background: #9b59b6; }
        .v-32 { background: #f1c40f; color: #1a1a2e; }
        .v-64 { background: #e67e22; }
        .v-128 { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .v-256 { background: #ff0055; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 46, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048: التحدي الكامل</h1>
        
        <div class="difficulty-selector">
            <button class="diff-btn active" onclick="setDiff('easy', this)">سهل</button>
            <button class="diff-btn" onclick="setDiff('medium', this)">متوسط</button>
            <button class="diff-btn" onclick="setDiff('hard', this)">صعب</button>
        </div>

        <div class="stats">
            <div class="stat-box">السكور: <span id="score">0</span></div>
            <div class="stat-box">المستوى: <span id="level-name">سهل</span></div>
        </div>
    </div>

    <div class="game-board" id="board">
        <div class="game-over" id="gameOver">
            <h2>انتهت اللعبة!</h2>
            <button class="diff-btn active" onclick="resetGame()">إعادة المحاولة</button>
        </div>
    </div>

    <div class="controls-hint">اسحب للدمج وتفريغ المساحة!</div>

    <script>
        let score = 0;
        let difficulty = 'easy';
        let grid = [];
        const size = 4;
        const boardElement = document.getElementById('board');

        const diffSettings = {
            easy: { startTiles: 8, maxInit: 4, name: "سهل" },
            medium: { startTiles: 12, maxInit: 8, name: "متوسط" },
            hard: { startTiles: 16, maxInit: 16, name: "صعب (ممتلئ)" }
        };

        function setDiff(level, btn) {
            difficulty = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('level-name').innerText = diffSettings[level].name;
            resetGame();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('gameOver').style.display = 'none';
            initBoard();
        }

        function initBoard() {
            grid = Array(size * size).fill(0);
            const settings = diffSettings[difficulty];
            
            // ملء المربعات حسب مستوى الصعوبة
            let positions = Array.from({length: 16}, (_, i) => i);
            positions.sort(() => Math.random() - 0.5);

            for(let i = 0; i < settings.startTiles; i++) {
                grid[positions[i]] = Math.random() > 0.5 ? 2 : 4;
            }
            render();
        }

        function render() {
            // مسح المربعات القديمة مع الحفاظ على الأوفرلاي
            const tiles = boardElement.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());

            grid.forEach((val, idx) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = `tile ${val ? 'v-' + val : ''}`;
                tileDiv.innerText = val || '';
                boardElement.appendChild(tileDiv);
            });
        }

        function move(dir) {
            let moved = false;
            // منطق الحركة المبسط للسرعة
            // (بما أنك طلبت "تزوج فيهم"، المنطق هنا يدمج الأرقام المتشابهة)
            
            let prevGrid = [...grid];

            // تحريك ودمج (منطق صلب)
            for (let i = 0; i < size; i++) {
                let line = [];
                for (let j = 0; j < size; j++) {
                    let idx = (dir === 'UP' || dir === 'DOWN') ? (j * size + i) : (i * size + j);
                    line.push(grid[idx]);
                }

                if (dir === 'DOWN' || dir === 'LEFT') line.reverse();

                let newLine = line.filter(v => v !== 0);
                for (let k = 0; k < newLine.length - 1; k++) {
                    if (newLine[k] === newLine[k+1]) {
                        newLine[k] *= 2;
                        score += newLine[k];
                        newLine.splice(k+1, 1);
                        newLine.push(0);
                        moved = true;
                    }
                }
                while (newLine.length < size) newLine.push(0);
                if (dir === 'DOWN' || dir === 'LEFT') newLine.reverse();

                for (let j = 0; j < size; j++) {
                    let idx = (dir === 'UP' || dir === 'DOWN') ? (j * size + i) : (i * size + j);
                    grid[idx] = newLine[j];
                }
            }

            if (JSON.stringify(prevGrid) !== JSON.stringify(grid)) {
                // إضافة رقم جديد دائماً لجعل اللعبة "حماسية" وممتلئة
                addRandomTile();
                render();
                document.getElementById('score').innerText = score;
                checkStatus();
            }
        }

        function addRandomTile() {
            let empty = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                let loc = empty[Math.floor(Math.random() * empty.length)];
                // في المستوى الصعب، تظهر أرقام أكبر فجأة
                let values = difficulty === 'hard' ? [2, 4, 8] : [2, 4];
                grid[loc] = values[Math.floor(Math.random() * values.length)];
            }
        }

        function checkStatus() {
            if (!grid.includes(0)) {
                // تحقق إذا كان هناك أي دمج ممكن
                let canMove = false;
                for(let i=0; i<16; i++) {
                    if ((i%4 < 3 && grid[i] === grid[i+1]) || (i < 12 && grid[i] === grid[i+4])) {
                        canMove = true; break;
                    }
                }
                if (!canMove) document.getElementById('gameOver').style.display = 'flex';
            }
        }

        // اللمس
        let tsX, tsY;
        document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tsX;
            let dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'LEFT' : 'RIGHT');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'DOWN' : 'UP');
            }
        });

        // الكيبورد
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') move('UP');
            if(e.key === 'ArrowDown') move('DOWN');
            if(e.key === 'ArrowLeft') move('RIGHT');
            if(e.key === 'ArrowRight') move('LEFT');
        });

        resetGame();
    </script>
</body>
</html>
