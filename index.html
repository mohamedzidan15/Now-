<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Pro - تجربة حماسية</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-color: #bbada0;
            --cell-color: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-dark);
            margin: 0;
        }

        .score-container {
            background: var(--grid-color);
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            text-align: center;
        }

        .score-label { font-size: 13px; text-transform: uppercase; display: block; }
        .score-value { font-size: 25px; font-weight: bold; }

        .game-container {
            position: relative;
            width: 340px;
            height: 340px;
            background: var(--grid-color);
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            grid-gap: 15px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            width: 100%;
            height: 100%;
            background: var(--cell-color);
            border-radius: 3px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            z-index: 2;
        }

        .tile {
            position: absolute;
            width: 66.25px;
            height: 66.25px;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            transition: transform 120ms ease-in-out, background-color 100ms ease-in-out;
            z-index: 10;
        }

        /* الألوان حسب القيمة */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 24px; box-shadow: 0 0 10px rgba(237, 207, 114, 0.5); }
        .tile-256 { background: #edcc61; color: white; font-size: 24px; }
        .tile-512 { background: #edc850; color: white; font-size: 24px; }
        .tile-1024 { background: #edc53f; color: white; font-size: 20px; }
        .tile-2048 { background: #edc22e; color: white; font-size: 20px; box-shadow: 0 0 15px rgba(237, 194, 46, 0.8); }

        .tile-new { animation: appear 200ms ease-out; }
        .tile-merged { animation: pop 200ms ease-in-out; z-index: 20; }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .controls {
            margin-top: 30px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: center;
        }

        .btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #7f6a56; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(238, 228, 218, 0.7);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">2048</h1>
        <div class="score-container">
            <span class="score-label">السكور</span>
            <span id="score" class="score-value">0</span>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <div class="grid-container">
            <!-- 16 Cells -->
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="tile-container" id="tile-container"></div>
        
        <div class="overlay" id="game-over">
            <h2 style="font-size: 40px; color: #776e65;">Game Over!</h2>
            <button class="btn" onclick="initGame()">حاول مرة أخرى</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="initGame()">لعبة جديدة</button>
    </div>

    <script>
        const container = document.getElementById('tile-container');
        const scoreDisplay = document.getElementById('score');
        const gameOverOverlay = document.getElementById('game-over');
        let board = [];
        let score = 0;
        const size = 4;

        function initGame() {
            board = Array(size * size).fill(0);
            score = 0;
            scoreDisplay.innerText = score;
            gameOverOverlay.style.display = 'none';
            container.innerHTML = '';
            addRandomTile();
            addRandomTile();
            drawBoard();
        }

        function addRandomTile() {
            let emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function drawBoard() {
            container.innerHTML = '';
            board.forEach((val, i) => {
                if (val !== 0) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${val} tile-new`;
                    tile.innerText = val;
                    
                    const row = Math.floor(i / size);
                    const col = i % size;
                    
                    // حساب الموقع (اليسار هو 0 في LTR، لذا نحتاج للانتباه في RTL)
                    // في CSS هنا استخدمنا left كإزاحة ثابتة
                    tile.style.transform = `translate(${col * 81.25}px, ${row * 81.25}px)`;
                    container.appendChild(tile);
                }
            });
        }

        function move(direction) {
            let moved = false;
            let newBoard = [...board];

            const getIndex = (r, c) => r * size + c;

            if (direction === 'UP' || direction === 'DOWN') {
                for (let c = 0; c < size; c++) {
                    let column = [board[getIndex(0, c)], board[getIndex(1, c)], board[getIndex(2, c)], board[getIndex(3, c)]];
                    let filtered = column.filter(v => v !== 0);
                    if (direction === 'DOWN') filtered.reverse();
                    
                    for (let i = 0; i < filtered.length - 1; i++) {
                        if (filtered[i] === filtered[i+1]) {
                            filtered[i] *= 2;
                            score += filtered[i];
                            filtered.splice(i+1, 1);
                            moved = true;
                        }
                    }
                    
                    while (filtered.length < size) filtered.push(0);
                    if (direction === 'DOWN') filtered.reverse();
                    
                    for (let r = 0; r < size; r++) {
                        if (board[getIndex(r, c)] !== filtered[r]) moved = true;
                        newBoard[getIndex(r, c)] = filtered[r];
                    }
                }
            } else {
                for (let r = 0; r < size; r++) {
                    let row = [board[getIndex(r, 0)], board[getIndex(r, 1)], board[getIndex(r, 2)], board[getIndex(r, 3)]];
                    let filtered = row.filter(v => v !== 0);
                    if (direction === 'LEFT') filtered.reverse(); // عكس المنطق ليتناسب مع RTL
                    
                    for (let i = 0; i < filtered.length - 1; i++) {
                        if (filtered[i] === filtered[i+1]) {
                            filtered[i] *= 2;
                            score += filtered[i];
                            filtered.splice(i+1, 1);
                            moved = true;
                        }
                    }
                    
                    while (filtered.length < size) filtered.push(0);
                    if (direction === 'LEFT') filtered.reverse();
                    
                    for (let c = 0; c < size; c++) {
                        if (board[getIndex(r, c)] !== filtered[c]) moved = true;
                        newBoard[getIndex(r, c)] = filtered[c];
                    }
                }
            }

            if (moved) {
                board = newBoard;
                addRandomTile();
                scoreDisplay.innerText = score;
                drawBoard();
                if (checkGameOver()) gameOverOverlay.style.display = 'flex';
            }
        }

        function checkGameOver() {
            if (board.includes(0)) return false;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let curr = board[r * size + c];
                    if (c < size - 1 && curr === board[r * size + (c + 1)]) return false;
                    if (r < size - 1 && curr === board[(r + 1) * size + c]) return false;
                }
            }
            return true;
        }

        // التحكم بالكيبورد
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') move('UP');
            if (e.key === 'ArrowDown') move('DOWN');
            if (e.key === 'ArrowLeft') move('RIGHT'); // معكوس للـ RTL
            if (e.key === 'ArrowRight') move('LEFT');
        });

        // التحكم باللمس (Swipe)
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'LEFT' : 'RIGHT');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'DOWN' : 'UP');
            }
        });

        initGame();
    </script>
</body>
</html>
